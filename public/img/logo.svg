<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80" fill="none">
  <!-- Dumpster icon -->
  <!-- Main body -->
  <rect x="8" y="28" width="52" height="36" rx="3" fill="#003087"/>
  <!-- Lid -->
  <rect x="5" y="20" width="58" height="11" rx="2" fill="#D01F2A"/>
  <!-- Lid handle -->
  <rect x="26" y="15" width="16" height="7" rx="2" fill="#D01F2A"/>
  <!-- Legs -->
  <rect x="14" y="62" width="7" height="8" rx="1" fill="#003087"/>
  <rect x="47" y="62" width="7" height="8" rx="1" fill="#003087"/>
  <!-- Vertical stripes on body (Chicago flag nod) -->
  <rect x="22" y="30" width="3" height="32" rx="1" fill="#D01F2A" opacity="0.6"/>
  <rect x="43" y="30" width="3" height="32" rx="1" fill="#D01F2A" opacity="0.6"/>
  <!-- Horizontal stripe on body -->
  <rect x="8" y="43" width="52" height="3" rx="1" fill="white" opacity="0.15"/>

  <!-- Wordmark -->
  <text x="76" y="42" font-family="'Arial Black', 'Arial', sans-serif" font-weight="900" font-size="19" fill="#003087" letter-spacing="-0.5">WINDY CITY</text>
  <text x="76" y="63" font-family="'Arial Black', 'Arial', sans-serif" font-weight="900" font-size="19" fill="#D01F2A" letter-spacing="-0.5">DUMPSTERS</text>
</svg>
